<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Товары')}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container">
    <h1>Управление комплектующими</h1>
    <form class="panel" th:action="@{/admin/components}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="grid">
            <label>Название <input name="name" required></label>
            <label>Категория
                <select name="categoryId" required>
                    <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
                </select>
            </label>
            <label>Цена <input name="price" type="number" step="0.01" required></label>
            <label>Бренд <input name="brand"></label>
            <label>Тип комплектующего
                <select name="partType">
                    <option value="CASE">Корпус</option>
                    <option value="MOTHERBOARD">Материнская плата</option>
                    <option value="CPU">Процессор</option>
                    <option value="COOLING">Охлаждение</option>
                    <option value="RAM">Оперативная память</option>
                    <option value="GPU">Видеокарта</option>
                    <option value="M2">SSD M.2</option>
                    <option value="SATA">SSD 2.5 / SATA</option>
                    <option value="PSU">Блок питания</option>
                    <option value="OTHER">Другое</option>
                </select>
            </label>
            <label>Сокет <input name="socketType"></label>
            <label>Тип памяти <input name="memoryType"></label>
            <label>Форм-фактор <input name="formFactor" placeholder="ATX, mATX, Mini-ITX"></label>
            <label>Интерфейс накопителя <input name="storageInterface" placeholder="M.2, SATA"></label>
            <label>Мощность, W <input name="wattage" type="number"></label>
            <label>Наличие <input name="stock" type="number" value="0" required></label>
        </div>
        <label>Характеристики <textarea name="specs"></textarea></label>
        <button type="submit">Сохранить товар</button>
    </form>

    <table style="margin-top:18px">
        <thead><tr><th>ID</th><th>Товар</th><th>Категория</th><th>Совместимость</th><th>Цена</th><th>Наличие</th></tr></thead>
        <tbody>
        <tr th:each="item : ${components}">
            <td th:text="${item.id}"></td>
            <td th:text="${item.name}"></td>
            <td th:text="${item.category.name}"></td>
            <td th:text="'Сокет: ' + (${item.socketType != null ? item.socketType : '-'}) +
                         ', память: ' + (${item.memoryType != null ? item.memoryType : '-'}) +
                         ', форм-фактор: ' + (${item.formFactor != null ? item.formFactor : '-'}) +
                         ', интерфейс: ' + (${item.storageInterface != null ? item.storageInterface : '-'})"></td>
            <td th:text="${item.price}"></td>
            <td th:text="${item.stock}"></td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
