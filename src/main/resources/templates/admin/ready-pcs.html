<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Готовые ПК')}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container">
    <h1>Управление готовыми ПК</h1>
    <form class="panel" th:action="@{/admin/ready-pcs}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="grid">
            <label>Название <input name="name" required></label>
            <label>Назначение <input name="purpose" required></label>
            <label>Цена <input name="price" type="number" step="0.01" required></label>
            <label>Наличие <input name="stock" type="number" required></label>
        </div>
        <label>Описание <textarea name="description" required></textarea></label>
        <button type="submit">Сохранить ПК</button>
    </form>
    <table style="margin-top:18px">
        <thead><tr><th>ID</th><th>Название</th><th>Назначение</th><th>Цена</th><th>Наличие</th></tr></thead>
        <tbody>
        <tr th:each="pc : ${pcs}">
            <td th:text="${pc.id}"></td>
            <td th:text="${pc.name}"></td>
            <td th:text="${pc.purpose}"></td>
            <td th:text="${pc.price}"></td>
            <td th:text="${pc.stock}"></td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
