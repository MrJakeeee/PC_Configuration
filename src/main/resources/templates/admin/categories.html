<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Категории')}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container">
    <h1>Категории товаров</h1>
    <form class="panel" th:action="@{/admin/categories}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <label>Название <input name="name" required></label>
        <label>Описание <input name="description"></label>
        <button type="submit">Добавить категорию</button>
    </form>
    <table style="margin-top:18px">
        <thead><tr><th>ID</th><th>Редактирование</th></tr></thead>
        <tbody>
        <tr th:each="category : ${categories}">
            <td th:text="${category.id}"></td>
            <td>
                <form class="toolbar" th:action="@{/admin/categories}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="id" th:value="${category.id}">
                    <label>Название <input name="name" th:value="${category.name}" required></label>
                    <label>Описание <input name="description" th:value="${category.description}"></label>
                    <button type="submit">Сохранить</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
