<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head('Готовые ПК')}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container page-stack">
    <section class="page-title">
        <div>
            <h1>Готовые ПК</h1>
            <p class="muted">Выберите готовую сборку, если не хотите собирать компьютер вручную.</p>
        </div>
        <a class="button secondary" th:href="@{/configurator}">Собрать самому</a>
    </section>

    <form class="toolbar search-panel" th:action="@{/ready-pcs}" method="get">
        <label>Поиск
            <input name="q" th:value="${q}" placeholder="игры, офис, монтаж, compact">
        </label>
        <button type="submit">Найти</button>
    </form>

    <div class="grid product-grid">
        <article class="card product-card" th:each="pc : ${pcs}">
            <span class="badge" th:text="${pc.purpose}">Назначение</span>
            <h3 th:text="${pc.name}">ПК</h3>
            <p class="muted" th:text="${pc.description}">Описание</p>
            <p class="price"><strong th:text="${pc.price + ' сом'}">0 сом</strong></p>
            <div class="actions" sec:authorize="isAuthenticated()">
                <form th:action="@{/cart/ready-pc}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="readyPcId" th:value="${pc.id}">
                    <button type="submit"
                            th:disabled="${cartReadyPcIds.contains(pc.id)}"
                            th:text="${cartReadyPcIds.contains(pc.id) ? 'В корзине' : 'В корзину'}">В корзину</button>
                </form>
                <form th:action="@{/favorites/ready-pc}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="readyPcId" th:value="${pc.id}">
                    <button type="submit"
                            class="secondary"
                            th:disabled="${favoriteReadyPcIds.contains(pc.id)}"
                            th:text="${favoriteReadyPcIds.contains(pc.id) ? 'В избранных' : 'В избранное'}">В избранное</button>
                </form>
                <a class="button secondary" th:href="@{/checkout/ready-pc/{id}(id=${pc.id})}">Оформить сразу</a>
            </div>
            <a class="button secondary" sec:authorize="isAnonymous()" th:href="@{/login}">Войти для заказа</a>
        </article>
    </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
