<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Вход')}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container">
    <section class="panel" style="max-width:460px;margin:auto">
        <h1>Вход</h1>
        <p class="notice" th:if="${param.registered}">Регистрация завершена. Теперь войдите в систему.</p>
        <p class="error" th:if="${param.error}">Неверный логин или пароль.</p>
        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label>Логин <input name="username" required autofocus></label>
            <label>Пароль <input name="password" type="password" required></label>
            <div class="actions">
                <button type="submit">Войти</button>
                <a class="button secondary" th:href="@{/register}">Регистрация</a>
            </div>
        </form>
        <p class="muted">Тестовые роли: admin/admin, deliverer/deliverer, user/user.</p>
    </section>
</main>
</body>
</html>
