<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head('Каталог комплектующих')}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container page-stack">
    <section class="page-title">
        <div>
            <h1>Каталог комплектующих</h1>
            <p class="muted">Фильтруйте детали и смотрите параметры совместимости для будущей сборки.</p>
        </div>
        <a class="button" th:href="@{/configurator}">Открыть конфигуратор</a>
    </section>

    <form class="toolbar search-panel" th:action="@{/catalog}" method="get">
        <label>Категория
            <select name="categoryId">
                <option value="">Все категории</option>
                <option th:each="category : ${categories}"
                        th:value="${category.id}"
                        th:selected="${category.id == selectedCategoryId}"
                        th:text="${category.name}"></option>
            </select>
        </label>
        <label>Поиск
            <input name="q" th:value="${q}" placeholder="бренд, модель, характеристика">
        </label>
        <button type="submit">Фильтровать</button>
    </form>

    <div class="grid product-grid">
        <article class="card product-card" th:each="item : ${items}">
            <span class="badge" th:text="${item.category.name}">Категория</span>
            <h3 th:text="${item.name}">Компонент</h3>
            <p class="muted" th:text="${item.brand ?: 'Без бренда'}">Бренд</p>
            <p class="price"><strong th:text="${item.price + ' сом'}">0 сом</strong></p>
            <p th:text="${item.specs}">Характеристики</p>
            <div class="spec-row">
                <span>Сокет: <b th:text="${item.socketType ?: '-'}"></b></span>
                <span>Память: <b th:text="${item.memoryType ?: '-'}"></b></span>
                <span>Форм-фактор: <b th:text="${item.formFactor ?: '-'}"></b></span>
                <span>Наличие: <b th:text="${item.stock}"></b></span>
            </div>
            <div class="actions" sec:authorize="isAuthenticated()">
                <form th:action="@{/cart/component}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="componentId" th:value="${item.id}">
                    <button type="submit"
                            th:disabled="${cartComponentIds.contains(item.id)}"
                            th:text="${cartComponentIds.contains(item.id) ? 'В корзине' : 'В корзину'}">В корзину</button>
                </form>
                <form th:action="@{/favorites/component}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="componentId" th:value="${item.id}">
                    <button type="submit"
                            class="secondary"
                            th:disabled="${favoriteComponentIds.contains(item.id)}"
                            th:text="${favoriteComponentIds.contains(item.id) ? 'В избранных' : 'В избранное'}">В избранное</button>
                </form>
            </div>
            <a class="button secondary" sec:authorize="isAnonymous()" th:href="@{/login}">Войти для покупки</a>
        </article>
    </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
