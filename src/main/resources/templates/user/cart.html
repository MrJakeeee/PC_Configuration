<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Корзина')}"></head>
<body>
<nav th:replace="~{fragments :: nav}"></nav>
<main class="container page-stack">
    <nav class="account-tabs">
        <a th:href="@{/profile}">Профиль</a>
        <a class="active" th:href="@{/cart}">Корзина</a>
        <a th:href="@{/favorites}">Избранное</a>
        <a th:href="@{/builds}">Сборки</a>
        <a th:href="@{/orders}">Заказы</a>
    </nav>

    <section class="page-title">
        <div>
            <h1>Корзина</h1>
            <p class="muted">По умолчанию выбраны все товары. Можно снять лишние позиции и оформить только часть корзины.</p>
        </div>
        <a class="button secondary" th:href="@{/catalog}">Добавить комплектующие</a>
    </section>

    <form class="selection-panel" th:if="${!#lists.isEmpty(items)}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="cart-list">
            <div class="select-row" th:each="item : ${items}">
                <input type="checkbox" name="selectedIds" th:value="${item.id}" checked>
                <span>
                    <strong th:text="${item.name}">Товар</strong>
                    <small th:text="${item.typeLabel}">Тип</small>
                </span>
                <label class="quantity-field">
                    Кол-во
                    <input type="hidden" name="cartItemIds" th:value="${item.id}">
                    <input type="number" name="quantities" th:value="${item.quantity}" min="1">
                </label>
                <b th:text="${item.totalPrice + ' сом'}">0 сом</b>
            </div>
        </div>

        <aside class="summary-box light-summary">
            <p class="summary-muted">Общая стоимость корзины</p>
            <p class="summary-price" th:text="${total + ' сом'}">0 сом</p>
            <label>Имя
                <input name="firstName" th:value="${firstName}" th:classappend="${fieldErrors != null and fieldErrors.containsKey('firstName')} ? ' field-invalid'" required>
                <span class="field-error" th:if="${fieldErrors != null and fieldErrors.containsKey('firstName')}" th:text="${fieldErrors.get('firstName')}"></span>
            </label>
            <label>Фамилия
                <input name="lastName" th:value="${lastName}" th:classappend="${fieldErrors != null and fieldErrors.containsKey('lastName')} ? ' field-invalid'" required>
                <span class="field-error" th:if="${fieldErrors != null and fieldErrors.containsKey('lastName')}" th:text="${fieldErrors.get('lastName')}"></span>
            </label>
            <label>Телефон
                <input name="phone" th:value="${checkoutPhone ?: user.phone}" placeholder="+996 ..." th:classappend="${fieldErrors != null and fieldErrors.containsKey('phone')} ? ' field-invalid'" required>
                <span class="field-error" th:if="${fieldErrors != null and fieldErrors.containsKey('phone')}" th:text="${fieldErrors.get('phone')}"></span>
            </label>
            <label>Адрес доставки
                <input name="address" th:value="${checkoutAddress ?: user.address}" placeholder="Город, улица, дом" th:classappend="${fieldErrors != null and fieldErrors.containsKey('address')} ? ' field-invalid'" required>
                <span class="field-error" th:if="${fieldErrors != null and fieldErrors.containsKey('address')}" th:text="${fieldErrors.get('address')}"></span>
            </label>
            <label>Номер карты
                <input name="cardNumber" th:value="${cardNumber}" inputmode="numeric" autocomplete="cc-number" placeholder="0000 0000 0000 0000" maxlength="19" pattern="(?:\d{4} ){3}\d{4}|\d{16}" data-card-number th:classappend="${fieldErrors != null and fieldErrors.containsKey('cardNumber')} ? ' field-invalid'" required>
                <span class="field-error" th:if="${fieldErrors != null and fieldErrors.containsKey('cardNumber')}" th:text="${fieldErrors.get('cardNumber')}"></span>
            </label>
            <label>Срок карты
                <input name="cardExpiry" th:value="${cardExpiry}" inputmode="numeric" autocomplete="cc-exp" placeholder="ММ/ГГ" maxlength="5" pattern="\d{2}/\d{2}" data-card-expiry th:classappend="${fieldErrors != null and fieldErrors.containsKey('cardExpiry')} ? ' field-invalid'" required>
                <span class="field-error" th:if="${fieldErrors != null and fieldErrors.containsKey('cardExpiry')}" th:text="${fieldErrors.get('cardExpiry')}"></span>
            </label>
            <label>CVV
                <input name="cardCvv" inputmode="numeric" autocomplete="cc-csc" placeholder="123" maxlength="4" pattern="\d{3,4}" data-card-cvv th:classappend="${fieldErrors != null and fieldErrors.containsKey('cardCvv')} ? ' field-invalid'" required>
                <span class="field-error" th:if="${fieldErrors != null and fieldErrors.containsKey('cardCvv')}" th:text="${fieldErrors.get('cardCvv')}"></span>
            </label>
            <label>Комментарий
                <textarea name="comment" th:text="${comment}" placeholder="Удобное время, детали доставки"></textarea>
            </label>
            <div class="actions">
                <button type="submit" th:formaction="@{/orders/cart}">Купить выбранные</button>
                <button type="submit" class="secondary" th:formaction="@{/cart/update}" formnovalidate>Обновить количество</button>
                <button type="submit" class="secondary" th:formaction="@{/cart/delete}" formnovalidate>Удалить выбранные</button>
            </div>
        </aside>
    </form>

    <div class="empty-state" th:if="${#lists.isEmpty(items)}">
        Корзина пустая. Добавьте комплектующие или готовый ПК.
    </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
<script th:src="@{/js/payment-fields.js}"></script>
</body>
</html>
