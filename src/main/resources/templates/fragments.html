<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | PC Configuration'">PC Configuration</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script th:src="@{/js/theme.js}" defer></script>
</head>
<body>
<header class="site-header" th:fragment="nav">
    <nav class="topbar">
        <a class="brand" th:href="@{/configurator}">
            <span class="brand-mark">PC</span>
            <span>Configuration</span>
        </a>
        <div class="links">
            <a th:href="@{/configurator}">Конфигуратор</a>
            <a th:href="@{/catalog}">Комплектующие</a>
            <a th:href="@{/ready-pcs}">Готовые ПК</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/builds}">Мои сборки</a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}">Админ</a>
            <a sec:authorize="hasRole('DELIVERER')" th:href="@{/deliverer}">Доставка</a>
        </div>
        <div class="auth">
            <button type="button" class="theme-toggle" data-theme-toggle aria-label="Сменить тему">
                <span data-theme-icon>☾</span>
            </button>
            <a sec:authorize="isAnonymous()" th:href="@{/login}">Войти</a>
            <a class="button small" sec:authorize="isAnonymous()" th:href="@{/register}">Регистрация</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/profile}">Личный кабинет</a>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="link-button">Выйти</button>
            </form>
        </div>
    </nav>
</header>

<footer class="site-footer" th:fragment="footer">
    <div>
        <strong>PC Configuration</strong>
        <span>Конфигуратор ПК, каталог комплектующих и готовые сборки.</span>
    </div>
    <div class="footer-links">
        <a th:href="@{/configurator}">Конфигуратор</a>
        <a th:href="@{/catalog}">Каталог</a>
        <a th:href="@{/ready-pcs}">Готовые ПК</a>
        <a th:href="@{/profile}">Личный кабинет</a>
    </div>
</footer>
</body>
</html>
